<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>The Emoji Wheel</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: #111;
  overflow: hidden;
  font-family: Arial, sans-serif;
  user-select: none;
  touch-action: none;
}

#BTN {
  position: fixed;
  right: 15px;
  top: 180px;
  width: 60px;          /* Equal width */
  height: 60px;         /* Equal height */
  font-size: 16px;
  background: gold;
  color: rgb(0, 0, 0);
  border: none;
  border-radius: 50%;   /* Makes it a circle */
  z-index: 10;
  display: flex;        /* Center content */
  align-items: center;
  justify-content: center;
}

#wheel-container {
  position: fixed;
  width: min(80vw, 400px);
  height: min(80vw, 400px);
  display: none;
  pointer-events: auto;
  z-index: 5;
}

svg {
  width: 100%;
  height: 100%;
}

.slice {
  fill: rgba(10, 25, 74, 0.8);
  stroke: rgb(0, 51, 255);
  stroke-width: 2;
  transition: 0.2s;
}

.slice.active {
  fill: rgba(255,255,255,0.3);
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.7));
}

.label {
  fill: white;
  font-size: clamp(15px, 2vw, 16px);
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
}

.center-circle {
  fill: rgba(255,255,255,0.1);
  stroke: rgba(255,255,255,0.2);
  stroke-width: 2;
  transition: 0.2s;
}

.center-circle.active {
  fill: rgba(255,255,255,0.35);
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.7));
}
</style>
  </head>

  <body>

<button id="BTN"><b>TAP!</b></button>

<div id="wheel-container">
  <svg id="wheel"></svg>
</div style="display:flex; justify-content: center; text-align: center;">

<audio id="myAudio" src="linked.mp3"></audio>

<div style="position: relative; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column;">
  <span id="smiley" style="font-size: 100px; position: absolute; top: 30%; transform: translateY(-50%);" onclick="copy_smile()">🙂</span>
  <div id="text" class="neon-text" style="margin-top: 130px;">THE EMOJI-WHEEL</div>
</div>

<script>
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

const container = document.getElementById("wheel-container");
const svg = document.getElementById("wheel");

let currentIndex = null;
let holdTimer = null;
let menuStack = [];
let isOpen = false;
let hasScrolled = false;
let fastSelect = false;

document.getElementById("BTN").addEventListener("click", button);

function copy_smile() {
  const smileyElement = document.getElementById("smiley");
  const audio = document.getElementById("myAudio");
  const smileyText = smileyElement.textContent; // get emoji from span
  navigator.clipboard.writeText(smileyText);
  //console.log(smileyText);
  smileyElement.addEventListener("click", () => {
      audio.play();
    });
}

function playAnim(smiley) {
  document.getElementById("smiley").innerHTML = smiley;
}

const menus = {
  main: [
    {label:"RIGHT",next:"right"},
    {label:"emotions",next:"emotions"},
    {label:"sick",next:"sick"},
    {label:"angry",next:"angry"},
    {label:"poop",action:()=>playAnim("💩")},
    {label:"funny",next:"funny"},
    {label:"happy",next:"happy"},
    {label:"LEFT",next:"left"}
  ],
  emotions: [
    {label:"😍",action:()=>playAnim("😍")},
    {label:"🥰",action:()=>playAnim("🥰")},
    {label:"BACK"}
  ],
  left: [
    {label:"animals", next:"animals"},
    {label:"→"}
  ],
  animals: [
    {label:"😺",action:()=>playAnim("😺")},
    {label:"→"}
  ],
  sick: [
    {label:"🤢",action:()=>playAnim("🤢")},
    {label:"BACK"}
  ],
  angry: [
    {label:"🤬",action:()=>playAnim("🤬")},
    {label:"BACK"}
  ],
  right: [
    {label:"aliens", next:"aliens"},
    {label:"←"}
  ],
  aliens: [
    {label:"👽",action:()=>playAnim("👽")},
    {label:"←"}
  ],
  funny: [
    {label:"😀",action:()=>playAnim("😀")},
    {label:"😄",action:()=>playAnim("😄")},
    {label:"😂",action:()=>playAnim("😂")},
    {label:"BACK"}
  ],
  happy: [
    {label:"😊",action:()=>playAnim("😊")},
    {label:"😇",action:()=>playAnim("😇")},
    {label:"BACK"}
  ]
};

function polarToCartesian(cx,cy,r,angle){
  const rad=(angle-90)*Math.PI/180;
  return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
}

function createSlice(cx,cy,innerR,outerR,startAngle,endAngle){
  const startOuter=polarToCartesian(cx,cy,outerR,endAngle);
  const endOuter=polarToCartesian(cx,cy,outerR,startAngle);
  const startInner=polarToCartesian(cx,cy,innerR,endAngle);
  const endInner=polarToCartesian(cx,cy,innerR,startAngle);
  const largeArc=endAngle-startAngle<=180?0:1;
  return `
    M ${startOuter.x} ${startOuter.y}
    A ${outerR} ${outerR} 0 ${largeArc} 0 ${endOuter.x} ${endOuter.y}
    L ${endInner.x} ${endInner.y}
    A ${innerR} ${innerR} 0 ${largeArc} 1 ${startInner.x} ${startInner.y}
    Z`;
}

function buildWheel(options){
  svg.innerHTML="";
  const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.8, 400);
  const cx = size/2;
  const cy = size/2;
  const outerR = size * 0.42;
  const innerR = size * 0.2;
  const angleStep = 360/options.length;

  options.forEach((opt,i)=>{
    const start=i*angleStep;
    const end=start+angleStep;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",createSlice(cx,cy,innerR,outerR,start,end));
    path.classList.add("slice");
    svg.appendChild(path);

    path.addEventListener("click",()=>{
      currentIndex=i;
      hasScrolled=true;
      fastSelect=true;
      updateHighlight();
    });

    const midAngle=start+angleStep/2;
    const labelPos=polarToCartesian(cx,cy,(innerR+outerR)/2,midAngle);
    const text=document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x",labelPos.x);
    text.setAttribute("y",labelPos.y);
    text.textContent=opt.label;
    text.classList.add("label");
    svg.appendChild(text);
  });

  const center=document.createElementNS("http://www.w3.org/2000/svg","circle");
  center.setAttribute("cx",cx);
  center.setAttribute("cy",cy);
  center.setAttribute("r",innerR-10);
  center.classList.add("center-circle");
  center.id="centerCircle";
  center.addEventListener("click", closeWheel);
  svg.appendChild(center);

  updateHighlight();
}

function updateHighlight(){
  const slices=document.querySelectorAll(".slice");
  const center=document.getElementById("centerCircle");
  slices.forEach(s=>s.classList.remove("active"));
  center.classList.remove("active");

  if(!hasScrolled||currentIndex===null){
    center.classList.add("active");
    return;
  }

  slices[currentIndex].classList.add("active");
  if(holdTimer)clearTimeout(holdTimer);

  holdTimer=setTimeout(()=>{
    const currentMenu=menuStack[menuStack.length-1];
    const option=currentMenu[currentIndex];
    if(option.label==="BACK"||option.label==="←"||option.label==="→"){
      if(menuStack.length>1){
        menuStack.pop();
        resetToNeutral();
        buildWheel(menuStack[menuStack.length-1]);
      }
      return;
    }
    if(option.next){
      menuStack.push(menus[option.next]);
      resetToNeutral();
      buildWheel(menuStack[menuStack.length-1]);
    }
    else if(option.action){
      option.action();
      closeWheel();
    }
  },fastSelect?100:800);
  fastSelect=false;
}

function resetToNeutral(){
  currentIndex=null;
  hasScrolled=false;
}

function openWheel(x,y){
  document.getElementById("BTN").style.display = "none";
  const wheelSize=Math.min(window.innerWidth*0.8, window.innerHeight*0.8, 400);
  if(isMobile){
    container.style.left=(window.innerWidth-wheelSize)/2+"px";
    container.style.top=(window.innerHeight-wheelSize-20)+"px";
  } else {
    container.style.left=(x-wheelSize/2)+"px";
    container.style.top=(y-wheelSize/2)+"px";
  }
  container.style.display="block";
  menuStack=[menus.main];
  resetToNeutral();
  isOpen=true;
  buildWheel(menuStack[0]);
}

function closeWheel(){
  document.getElementById("BTN").style.display = "block";
  container.style.display="none";
  isOpen=false;
  if(holdTimer)clearTimeout(holdTimer);
}

function button(){
  if(isMobile) openWheel(window.innerWidth/2, window.innerHeight/2);
  else openWheel(window.innerWidth/2, window.innerHeight/2);
  document.getElementById("BTN").style.display = "none";

}

document.addEventListener("contextmenu",e=>{
  e.preventDefault();
  openWheel(e.clientX,e.clientY);
});

document.addEventListener("wheel",e=>{
  if(!isOpen) return;
  e.preventDefault();
  const menu=menuStack[menuStack.length-1];
  const length=menu.length;
  if(!hasScrolled){
    hasScrolled=true;
    currentIndex=0;
  } else {
    if(e.deltaY>0) currentIndex=(currentIndex+1)%length;
    else currentIndex=(currentIndex-1+length)%length;
  }
  updateHighlight();
},{passive:false});

let touchStartY=0;
let longPressTimer=null;

// Long-press detection for mobile
document.addEventListener("touchstart",e=>{
  //closeWheel();
  if(!isMobile) return;

  // start long press timer
  longPressTimer=setTimeout(()=>{
    if(!isOpen){
      openWheel(window.innerWidth/2, window.innerHeight/1);//2
    }
  },600); // hold for 600ms

  if(isOpen){
    touchStartY=e.touches[0].clientY;
  }
},{passive:false});

document.addEventListener("touchend",e=>{
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer=null;
  }
},{passive:false});

document.addEventListener("touchmove",e=>{
  if(!isOpen) return;
  e.preventDefault();
  const currentY=e.touches[0].clientY;
  const diff=touchStartY-currentY;
  if(Math.abs(diff)<25) return;
  const menu=menuStack[menuStack.length-1];
  const length=menu.length;
  if(!hasScrolled){
    hasScrolled=true;
    currentIndex=0;
  } else {
    if(diff>0) currentIndex=(currentIndex+1)%length;
    else currentIndex=(currentIndex-1+length)%length;
  }
  touchStartY=currentY;
  updateHighlight();
},{passive:false});

// Rebuild wheel on resize (important for mobile orientation changes)
window.addEventListener("resize",()=>{
  if(isOpen){
    buildWheel(menuStack[menuStack.length-1]);
  }
});

const texts = [
  "THE EMOJI-WHEEL",
  "An experiment in UI design.",
  "Click on the emoji to copy it to your clipboard",
  "To change the emoji, use the wheel",
  "How do I open the wheel?",
  "IF YOU ARE ON A COMPUTER:",
  "Press the button or right click anywhere on the screen",
  "IF YOU ARE ON A SMARTPHONE:",
  "Press the button or hold down anywhere on the screen",
  "Scroll using the mouse-wheel", 
  "Scroll by swiping up or down if you are on a phone",
  "Highlight an option on the wheel",
  "Wait a second or tap the option immediatly to open it",
  "To close the wheel tap at the center of it"
];

let index = 0;
const textElement = document.getElementById("text");

function changeText() {
  textElement.style.opacity = 0; // fade out
  setTimeout(() => {
    index = (index + 1) % texts.length;
    textElement.textContent = texts[index];
    textElement.style.opacity = 1; // fade in
    }, 2500); // matches transition duration
    }

setInterval(changeText, 5000); // every 5 seconds
</script>
  </body>
</html>
